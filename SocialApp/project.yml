name: SocialApp
options:
  bundleIdPrefix: dev.palimpsest
  deploymentTarget:
    iOS: "17.0"
settings:
  MARKETING_VERSION: "1.0"
targets:
  SocialApp:
    type: application
    platform: iOS
    sources:
      - SocialApp
      - Models
      - Networking
    settings:
      base:
        INFOPLIST_FILE: SocialApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.palimpsest.social
        SWIFT_VERSION: "5.0"
    info:
      path: SocialApp/Info.plist
      properties:
        CFBundleName: "Social"
        CFBundleDisplayName: "Social"
        LSRequiresIPhoneOS: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            64.181.233.156:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        NSLocationWhenInUseUsageDescription: "Palimpsest uses your current place to attach layers to the map."
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
